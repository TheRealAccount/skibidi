<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invidious Multi-Instance Search</title>
<style>
  body { background:#111; color:#eee; font-family:sans-serif; margin:0; }
  header { padding:1rem; background:#222; display:flex; gap:.5rem; }
  input { flex:1; padding:.5rem; background:#000; border:1px solid #444; color:#eee; }
  button { padding:.5rem 1rem; background:#c00; border:0; color:#fff; cursor:pointer; }
  #results { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:1rem; padding:1rem; }
  .card { background:#181818; border:1px solid #333; border-radius:6px; overflow:hidden; cursor:pointer; }
  .card img { width:100%; display:block; }
  .card .info { padding:.5rem; }
  iframe { width:100%; height:360px; border:0; }
  #errorBox { padding:.7rem; background:#400; color:#f88; display:none; margin:1rem; border-radius:4px; white-space:pre-line; }
  #usingBox { padding:.7rem; background:#024; color:#8cf; margin:1rem; border-radius:4px; display:none; }
</style>
</head>
<body>

<header>
  <input id="query" placeholder="Search videos">
  <button onclick="search()">Search</button>
</header>

<div id="usingBox"></div>
<div id="errorBox"></div>

<iframe id="player" allowfullscreen></iframe>

<div id="results"></div>

<script>
// Multiple fallback instances
const INSTANCES = [
  "https://invidious.nerdvpn.de",
  "https://invidious.flokinet.to",
  "https://invidious.jing.rocks",
  "https://invidious.privacydev.net",
  "https://invidious.protokolla.fi"
];

let workingInstance = null;

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent = msg;
}

function appendError(msg) {
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent += "\n" + msg;
}

function clearError() {
  const box = document.getElementById("errorBox");
  box.style.display = "none";
  box.textContent = "";
}

function showInstance(instance) {
  const box = document.getElementById("usingBox");
  box.style.display = "block";
  box.textContent = "Using instance: " + instance;
}

function formatDuration(sec) {
  sec = Number(sec || 0);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}

async function findWorkingInstance(query) {
  clearError();

  for (const inst of INSTANCES) {
    const url = `${inst}/api/v1/search?q=${encodeURIComponent(query)}&type=video`;

    try {
      const res = await fetch(url);
      if (!res.ok) {
        appendError(`${inst} → HTTP ${res.status}`);
        continue;
      }

      const json = await res.json();
      if (!Array.isArray(json)) {
        appendError(`${inst} → Invalid JSON`);
        continue;
      }

      workingInstance = inst;
      showInstance(inst);
      return json;

    } catch (e) {
      appendError(`${inst} → ${e.message}`);
    }
  }

  showError("All instances failed.");
  return null;
}

async function search() {
  const q = document.getElementById("query").value.trim();
  if (!q) return;

  const results = await findWorkingInstance(q);
  if (!results) return;

  const container = document.getElementById("results");
  container.innerHTML = "";

  results.forEach(v => {
    const id = v.videoId;
    const thumb = v.videoThumbnails?.[0]?.url || "";
    const title = v.title || "Untitled";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${thumb}">
      <div class="info">
        <div>${title}</div>
        <div style="color:#aaa;font-size:.8rem;">
          ${v.author} • ${formatDuration(v.lengthSeconds)}
        </div>
      </div>
    `;
    card.onclick = () => {
      document.getElementById("player").src = `${workingInstance}/embed/${id}`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    container.appendChild(card);
  });
}
</script>

</body>
</html>
