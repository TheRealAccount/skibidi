<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invidious Search</title>
<style>
  body { background:#111; color:#eee; font-family:sans-serif; margin:0; }
  header { padding:1rem; background:#222; display:flex; gap:.5rem; }
  input { flex:1; padding:.5rem; background:#000; border:1px solid #444; color:#eee; }
  button { padding:.5rem 1rem; background:#c00; border:0; color:#fff; cursor:pointer; }
  #results { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:1rem; padding:1rem; }
  .card { background:#181818; border:1px solid #333; border-radius:6px; overflow:hidden; cursor:pointer; }
  .card img { width:100%; display:block; }
  .card .info { padding:.5rem; }
  iframe { width:100%; height:360px; border:0; }
  #errorBox { padding:.7rem; background:#400; color:#f88; display:none; margin:1rem; border-radius:4px; }
</style>
</head>
<body>

<header>
  <input id="query" placeholder="Search videos">
  <button onclick="search()">Search</button>
</header>

<div id="errorBox"></div>

<iframe id="player" allowfullscreen></iframe>

<div id="results"></div>

<script>
const API = "https://invidious.nerdvpn.de"; // WORKING INSTANCE

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent = msg;
}

function clearError() {
  const box = document.getElementById("errorBox");
  box.style.display = "none";
  box.textContent = "";
}

function formatDuration(sec) {
  sec = Number(sec || 0);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}

async function search() {
  clearError();
  const q = document.getElementById("query").value.trim();
  if (!q) return;

  const url = `${API}/api/v1/search?q=${encodeURIComponent(q)}&type=video`;

  let data;
  try {
    const res = await fetch(url);
    if (!res.ok) {
      showError("API error: HTTP " + res.status);
      return;
    }
    data = await res.json();
  } catch (e) {
    showError("Network or CORS error: " + e.message);
    return;
  }

  if (!Array.isArray(data)) {
    showError("Invalid API response");
    return;
  }

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.forEach(v => {
    const id = v.videoId;
    const thumb = v.videoThumbnails?.[0]?.url || "";
    const title = v.title || "Untitled";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${thumb}">
      <div class="info">
        <div>${title}</div>
        <div style="color:#aaa;font-size:.8rem;">
          ${v.author} • ${formatDuration(v.lengthSeconds)}
        </div>
      </div>
    `;
    card.onclick = () => {
      document.getElementById("player").src = `${API}/embed/${id}`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    results.appendChild(card);
  });
}
</script>

</body>
</html>
